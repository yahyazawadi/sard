    name: tracker
    description: "to whom it concerns, I love you more than words can say."
    publish_to: 'none'

    version: 1.0.0+1

    environment:
      sdk: ^3.8.1

    dependencies:
      shared_preferences: ^2.3.2  # Or latest version
      flutter_dotenv: ^6.0.0  
      flutter:
        sdk: flutter
      hive: ^2.2.3
      hive_flutter: ^1.1.0
      flutter_secure_storage: ^10.0.0
      flex_color_scheme: ^8.4.0
      provider: ^6.1.2
      intl: ^0.20.2
      cupertino_icons: ^1.0.8
      image_picker: ^1.2.1
      path_provider: ^2.1.5
      uuid: ^4.5.2
      path: ^1.9.1
      permission_handler: ^12.0.1
      table_calendar: ^3.1.2
      go_router: ^14.3.0
      flutter_localizations:
        sdk: flutter

    dev_dependencies:
      hive_generator: ^2.0.1
      build_runner: ^2.4.13
      flutter_test:
        sdk: flutter
      flutter_lints: ^6.0.0

    flutter:
      uses-material-design: true
      generate: true

      fonts:
        - family: DG Sahabah
          fonts:
            - asset: assets/fonts/DG-Sahabah-Light.ttf
              weight: 300
            - asset: assets/fonts/DG-Sahabah-Reg.ttf
              weight: 400
            - asset: assets/fonts/DG-Sahabah-Bold.ttf
              weight: 700