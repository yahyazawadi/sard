name: sard
description: "A beautiful application for ordering chocolate."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_dotenv: ^6.0.0
  transparent_image: ^2.0.1
  provider: ^6.1.2
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  uuid: ^4.5.2
  path: ^1.9.1
  permission_handler: ^12.0.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  pasteboard: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  windows:
    generate: true
    image_path: "assets/images/juba_windows_icon.png"
  remove_alpha_ios: true
  image_path: "assets/images/Juba-tranceparent.png"
  adaptive_icon_background: "#5B301F"
  adaptive_icon_foreground: "assets/images/Juba-tranceparent.png"



flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: DG Sahabah
      fonts:
        - asset: assets/fonts/DG-Sahabah-Light.ttf
          weight: 300
        - asset: assets/fonts/DG-Sahabah-Reg.ttf
          weight: 400
        - asset: assets/fonts/DG-Sahabah-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#F1DBBC"
  color_dark: "#5B301F"
  image: assets/images/jubasplashdark.png
  image_dark: assets/images/jubasplashwhite.png
  android: true
  ios: true
  android_12:
    color: "#F1DBBC"
    color_dark: "#5B301F"
    image: assets/images/jubasplashdark.png
    image_dark: assets/images/jubasplashwhite.png




